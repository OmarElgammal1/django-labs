<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Omar's Kitchen</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f5f5f7;
            padding: 20px 40px;
            color: #333;
        }

        h1 {
            font-size: 28px;
            margin-bottom: 20px;
        }

        form {
            margin-bottom: 20px;
            display: flex;
            gap: 5px;
            align-items: center;
        }

        input[type="text"],
        select,
        button {
            padding: 4px 8px;
            border: 1px solid #ccc;
            border-radius: 3px;
            font-size: 14px;
            height: 28px;
            box-sizing: border-box;
        }

        button {
            background-color: #e9e9ed;
            cursor: pointer;
        }

        button:hover {
            background-color: #d1d1d4;
        }

        .dish-card {
            background-color: white;
            border-radius: 6px;
            padding: 20px;
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.1);
            margin-bottom: 20px;
            max-width: 800px;
        }

        .dish-card h2 {
            margin-top: 0;
            font-size: 20px;
            margin-bottom: 15px;
        }

        .dish-card p {
            margin: 8px 0;
            font-size: 15px;
        }

        .available {
            color: #28a745;
            font-weight: bold;
            margin-top: 15px;
        }

        .unavailable {
            color: #dc3545;
            font-weight: bold;
            margin-top: 15px;
        }
    </style>
</head>

<body>

    <h1>Omar's Kitchen 🍽️</h1>

    <form method="GET" action="">
        <input type="text" name="q" placeholder="" value="{{ q }}">
        <select name="category">
            <option value="">All Categories</option>
            {% for cat in categories %}
            <option value="{{ cat }}" {% if selected_category == cat %}selected{% endif %}>{{ cat }}</option>
            {% endfor %}
        </select>
        <button type="submit">Search</button>
    </form>

    {% for dish in dishes %}
    <div class="dish-card">
        <h2>{{ dish.name }}</h2>
        <p>Category: {{ dish.category }}</p>
        <p>Price: {{ dish.price }} EGP</p>

        {% if dish.available %}
        <div class="available">Available ✅</div>
        {% else %}
        <div class="unavailable">Unavailable ❌</div>
        {% endif %}
    </div>
    {% empty %}
    <p>No dishes found.</p>
    {% endfor %}

</body>

</html>
